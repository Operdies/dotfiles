shadow = true;
shadow-radius	= 20;
shadow-offset-x	= -12;
shadow-offset-y	= -12;
shadow-opacity = 0.80;

corner-radius = 4.0;
blur-background = true;
blur-method = "kernel";
blur-strength = 4;

fading = true;
fade-delta = 7.5;
fade-in-step = 0.056;
fade-out-step = 0.06;

vsync = true;
dbe	= true;
backend = "glx";

# basic configuration
opengl-swc = true

glx-copy-from-front = true;
glx-swap-method = 2;
xrender-sync = true;
xrender-sync-fence = true;

# transparancy settings for i3
opacity-rule = [
    "0:_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];
